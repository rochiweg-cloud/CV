---
layout: compress
---
<!doctype html>
<html lang="{{ page.lang | default: 'en' }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      .profile-masthead { border-bottom: 1px solid #ddd; background: #fff; }
      .masthead__inner-wrap { display: flex; align-items: center; justify-content: space-between; padding: 0.5em 1em; flex-wrap: wrap; gap: 0.5em; }
      .masthead__lang { display: flex; align-items: center; }
      .language-switcher { display: flex; gap: 0.4em; }
      .lang-pill { padding: 0.2em 0.6em; border: 1px solid #aaa; border-radius: 3px; font-size: 0.75em; text-decoration: none; color: #444; }
      .lang-pill:hover { background: #f0f0f0; }
      .lang-active { background: #222; color: #fff; border-color: #222; font-weight: bold; }

      .profile-layout { display: flex; gap: 2em; max-width: 1100px; margin: 2em auto; padding: 0 1.5em; }
      .profile-sidebar { flex: 0 0 220px; }
      .profile-sidebar__img { width: 100%; border-radius: 50%; max-width: 180px; display: block; margin: 0 auto 1em; }
      .profile-sidebar__name { font-size: 1em; margin: 0 0 0.3em; text-align: center; }
      .profile-sidebar__bio { font-size: 0.85em; color: #555; text-align: center; margin: 0 0 0.4em; }
      .profile-sidebar__location { font-size: 0.8em; color: #777; text-align: center; margin: 0 0 1em; }
      .profile-sidebar__links { display: flex; flex-direction: column; gap: 0.4em; }
      .profile-sidebar__links a { font-size: 0.82em; color: #444; text-decoration: none; }
      .profile-sidebar__links a:hover { color: #000; text-decoration: underline; }

      .profile-main { flex: 1; min-width: 0; }
      .profile-main h1 { font-size: 1.6em; border-bottom: 2px solid #eee; padding-bottom: 0.3em; margin-bottom: 1em; }
      .profile-main h2 { font-size: 1.2em; margin-top: 2em; color: #333; }

      .exp-entry { margin-bottom: 2em; }
      .exp-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.3em; }
      .exp-role { font-weight: bold; font-size: 1em; }
      .exp-dates { font-size: 0.85em; color: #666; white-space: nowrap; }
      .exp-org { font-size: 0.9em; color: #444; font-style: italic; margin: 0.15em 0 0.5em; }
      .exp-entry ul { margin: 0; padding-left: 1.3em; }
      .exp-entry li { font-size: 0.9em; margin-bottom: 0.3em; }

      .project-card { border: 1px solid #e5e5e5; border-radius: 6px; padding: 1.2em 1.4em; margin-bottom: 1.4em; }
      .project-card h3 { margin: 0 0 0.3em; font-size: 1em; }
      .project-card .project-meta { font-size: 0.8em; color: #777; margin-bottom: 0.6em; }
      .project-card p { font-size: 0.88em; margin: 0 0 0.6em; }
      .project-tags { display: flex; flex-wrap: wrap; gap: 0.3em; }
      .project-tag { font-size: 0.75em; background: #f0f0f0; padding: 0.15em 0.5em; border-radius: 3px; color: #555; }

      .edu-entry { margin-bottom: 1.2em; }
      .edu-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.3em; }
      .edu-title { font-weight: bold; font-size: 0.95em; }
      .edu-year { font-size: 0.85em; color: #666; }
      .edu-inst { font-size: 0.88em; color: #555; font-style: italic; }
      .edu-note { font-size: 0.85em; color: #666; margin-top: 0.2em; }

      .award-entry { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.3em; margin-bottom: 0.8em; }
      .award-title { font-size: 0.9em; font-weight: bold; }
      .award-year { font-size: 0.82em; color: #777; }
      .award-desc { font-size: 0.85em; color: #555; width: 100%; }

      .pub-entry { margin-bottom: 1.2em; }
      .pub-title { font-weight: bold; font-size: 0.93em; }
      .pub-venue { font-size: 0.85em; color: #555; font-style: italic; }
      .pub-note { font-size: 0.82em; color: #666; }

      .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1em; margin-top: 0.5em; }
      .skill-group h4 { font-size: 0.88em; margin: 0 0 0.3em; color: #333; }
      .skill-group p { font-size: 0.83em; color: #555; margin: 0; }

      .contact-block { max-width: 480px; }
      .contact-block p { font-size: 0.95em; }

      @media (max-width: 700px) {
        .profile-layout { flex-direction: column; }
        .profile-sidebar { flex: none; width: 100%; }
        .profile-sidebar__img { max-width: 120px; }
        .exp-header { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    {% include browser-upgrade.html %}
    {% include profile-masthead.html %}

    <div class="profile-layout">
      <aside>
        {% include profile-sidebar.html %}
      </aside>
      <main class="profile-main">
        {{ content }}
      </main>
    </div>

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>
    {% include scripts.html %}
  </body>
</html>
